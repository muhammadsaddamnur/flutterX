# Release pipeline (docs/08 §7): on a v* tag, compile the flutterx CLI into
# native AOT binaries per OS/arch and attach them to the GitHub Release with
# sha256 checksums. Distribution is via GitHub Releases + the install script
# (tool/install.sh) — not pub.dev.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve workspace
        run: dart pub get

      - name: Compile AOT binary
        shell: bash
        run: |
          out="flutterx-${{ matrix.target }}${{ matrix.ext }}"
          dart compile exe packages/flutterx_cli/bin/flutterx.dart -o "$out"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"

      - name: Checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARTIFACT" > "$ARTIFACT.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
