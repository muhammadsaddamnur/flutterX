# CI per docs/08 §6: format, analyze, dependency-rule lint, tests on 3-OS matrix.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Format · Analyze · Dependency rule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve workspace
        run: dart pub get
      - name: Format check
        run: dart format --set-exit-if-changed --output=none .
      - name: Static analysis
        run: dart analyze --fatal-infos .
      - name: Dependency-rule check
        run: dart run tool/check_dependency_rule.dart

  test:
    name: Tests (${{ matrix.os }})
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve workspace
        run: dart pub get
      - name: Activate melos
        run: dart pub global activate melos
      - name: Unit + use-case tests
        run: dart pub global run melos run test
      # TODO(T1.3.6): enable 'melos run test:integration' once the first
      # integration suites exist — 'dart test --tags=integration' exits
      # non-zero while no test carries the tag.
