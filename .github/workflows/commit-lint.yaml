# Conventional Commits enforcement per docs/08 §5.
# Checks every commit subject in the PR range against the convention:
#   <type>(<scope>): <summary>   (breaking marker "!" allowed, scope optional)
name: Commit lint

on:
  pull_request:

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        shell: bash
        run: |
          pattern='^(feat|fix|perf|refactor|docs|test|build|chore|revert)(\([a-z0-9_-]+\))?!?: .{1,72}$'
          fail=0
          while IFS= read -r subject; do
            if [[ ! "$subject" =~ $pattern ]]; then
              echo "✗ not a Conventional Commit: $subject"
              fail=1
            else
              echo "✓ $subject"
            fi
          done < <(git log --format=%s "origin/${{ github.base_ref }}..HEAD")
          exit $fail
